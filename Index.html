<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Company Sim Prototype</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; background: #333; border: 2px solid #555; margin: 10px auto; }
        .ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        .info { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="ui">
    <div class="info">
        <h3>公司模擬原型</h3>
        <p>員工正在自動尋找設備並提升屬性...</p>
        <div id="status-board"></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * 核心配置與初始化
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const statusBoard = document.getElementById('status-board');

canvas.width = 800;
canvas.height = 600;

// 遊戲資料
const employees = [];
const components = [];

// 1. 定義設備類別
class OfficeComponent {
    constructor(id, type, x, y, attr) {
        this.id = id;
        this.type = type;
        this.x = x;
        this.y = y;
        this.attr = attr; // 提升哪種屬性
        this.size = 40;
    }
    draw() {
        ctx.fillStyle = this.type === 'PC' ? '#4a90e2' : '#e2a74a';
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.fillStyle = 'white';
        ctx.fillText(this.type, this.x + 5, this.y + 25);
    }
}

// 2. 定義員工類別
class Employee {
    constructor(name, x, y) {
        this.name = name;
        this.x = x;
        this.y = y;
        this.intel = 10;
        this.target = null;
        this.speed = 2;
    }

    // 尋找目標的邏輯 (這就是你說的"判斷")
    findTarget() {
        // 簡單邏輯：找距離最近的設備
        if (components.length === 0) return;
        this.target = components[Math.floor(Math.random() * components.length)];
    }

    update() {
        if (!this.target) {
            this.findTarget();
            return;
        }

        // 移動邏輯
        const dx = this.target.x + 20 - this.x;
        const dy = this.target.y + 20 - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 5) {
            this.x += (dx / distance) * this.speed;
            this.y += (dy / distance) * this.speed;
        } else {
            // 到達目標，提升屬性
            this.intel += 1;
            this.target = null; // 完成任務，下一個循環會找新目標
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#50fa7b';
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.fillText(`${this.name} (IQ:${this.intel})`, this.x - 20, this.y - 15);
    }
}

// 初始化資料
components.push(new OfficeComponent(1, 'PC', 100, 100, 'intel'));
components.push(new OfficeComponent(2, 'Desk', 600, 400, 'efficiency'));
components.push(new OfficeComponent(3, 'PC', 100, 400, 'intel'));

employees.push(new Employee('工程師 A', 400, 300));
employees.push(new Employee('實習生 B', 450, 350));

// 遊戲主迴圈
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 更新與繪製設備
    components.forEach(c => c.draw());

    // 更新與繪製員工
    employees.forEach(e => {
        e.update();
        e.draw();
    });

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
